name: Debian ARM Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  debian-arm-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # arm = 32-bit ARMhf (v7) | aarch64 = 64-bit ARMhf (v8)
        arch: [arm, aarch64]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up QEMU Emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.arch }}

      - name: Run Check Inside Debian Container
        run: |
          docker run --rm \
            --platform linux/${{ matrix.arch == 'arm' && 'arm/v7' || 'arm64' }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            debian:stable-slim /bin/bash -c "
              apt-get update && apt-get install -y r-base-dev r-cran-rcpp libcurl4-openssl-dev libssl-dev libxml2-dev

              # Force R check flags environment variable to verify your configure logic
              export _R_CHECK_LIMIT_CORES_=true

              # Run R CMD check directly on the source tree
              R CMD build .
              R CMD check --no-manual --as-cran *.tar.gz
            "
